<!DOCTYPE html>
<html>
<head>
<title>James B. Bantilin</title>
<style>
body {
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #c0c0c0 100%);
    color: white;
    font-family: 'Arial', sans-serif;
    text-align: center;
    padding-top: 50px;
    margin: 0;
    min-height: 100vh;
}

img {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: 4px solid #c0c0c0;
    object-fit: cover;
    box-shadow: 0 0 20px rgba(192, 192, 192, 0.6), 0 4px 15px rgba(0,0,0,0.3);
}

h1 {
    font-size: 45px;
    text-shadow: 2px 2px 8px rgba(30, 60, 114, 0.8);
    margin-top: 20px;
    color: #e6f2ff;
}

p {
    font-size: 22px;
    opacity: 0.95;
    color: #d0e7ff;
    margin-bottom: 30px;
}

.social-links {
    margin-top: 20px;
}

.social-links a {
    display: inline-block;
    margin: 10px;
    padding: 12px 25px;
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid #c0c0c0;
    border-radius: 25px;
    color: white;
    text-decoration: none;
    font-size: 18px;
    transition: 0.3s;
}

.social-links a:hover {
    background: #c0c0c0;
    color: #1e3c72;
    transform: scale(1.05);
}
</style>
</head>
<body>
<img src="1778627011037.jpg" alt="James">
<h1>Hello! Ako si James</h1>
<p>The January 23 boy ♒</p>

<div class="social-links">
    <a href="https://facebook.com/" target="_blank">Facebook</a>
    <a href="https://instagram.com/" target="_blank">Instagram</a>
    <a href="https://tiktok.com/" target="_blank">TikTok</a>
</div>
</body>
</html>
